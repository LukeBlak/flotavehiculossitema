openapi: 3.0.4
info:
  title: API Sistema de Flota Vehicular
  version: 1.0.0
  description: |
    Especificacion OpenAPI para la API del sistema de flota vehicular.
    Seguridad implementada con Laravel Sanctum mediante Bearer Tokens.
servers:
  - url: http://flotavehiculossitema.test
    description: Entorno de prueba

tags:
  - name: Auth
    description: Autenticacion y gestion de token
  - name: VehicleTypes
    description: CRUD de tipos de vehiculo
  - name: Vehicles
    description: CRUD de vehiculos
  - name: Trips
    description: CRUD de viajes
  - name: FuelLogs
    description: CRUD de registros de combustible
  - name: MaintenanceLogs
    description: CRUD de registros de mantenimiento
  - name: Incidents
    description: CRUD de incidencias

paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesion y obtener token
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                value:
                  email: admin@flota.com
                  password: secret123
                  device_name: postman
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Cerrar sesion y revocar token actual
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token revocado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Sesion cerrada correctamente.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Obtener usuario autenticado
      operationId: me
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Usuario autenticado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

