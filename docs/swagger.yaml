      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    MaintenanceLogId:
      name: maintenance_log
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    IncidentId:
      name: incident
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

