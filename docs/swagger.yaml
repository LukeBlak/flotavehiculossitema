      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 15
    VehicleTypeId:
      name: vehicle_type
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    VehicleId:
      name: vehicle
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    TripId:
      name: trip
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    FuelLogId:
